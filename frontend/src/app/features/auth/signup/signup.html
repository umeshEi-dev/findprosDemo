<main class="auth-page">
  <section class="auth-panel">
    <div class="auth-copy">
      <p class="eyebrow">FindPros</p>
      <h1>Welcome to FindPros</h1>
      <p>Start your service onboarding with a modern step-by-step signup experience.</p>
    </div>

    <div class="auth-card onboarding-card">
      <div class="card-header">
        <h2>Get started with onboarding</h2>
        <p>Create your account, configure your coverage, and finish with password setup.</p>
      </div>

      <button type="button" class="primary-action" (click)="startOnboarding()">
        Join Now
      </button>

      <p class="switch-link">
        Already have an account?
        <a routerLink="/login">Sign in</a>
      </p>
    </div>
  </section>
</main>
