<div class="modal-backdrop" (click)="closed.emit()">
  <section class="filter-card" (click)="$event.stopPropagation()" aria-modal="true" role="dialog" aria-labelledby="filter-title">
    <header>
      <div>
        <p>Category</p>
        <h2 id="filter-title">Task Filter</h2>
      </div>
      <button type="button" class="close-button" (click)="closed.emit()" aria-label="Close filter">×</button>
    </header>

    <form [formGroup]="form" (ngSubmit)="apply()" class="filter-form">
      <label class="field">
        <span>Category Name</span>
        <input type="text" formControlName="categoryName" list="category-options" placeholder="Category Name" />
        <datalist id="category-options">
          <option *ngFor="let category of categories" [value]="category.name"></option>
        </datalist>
      </label>

      <label class="field select-field">
        <span>Task Type</span>
        <select formControlName="taskType">
          <option value="">All</option>
          <option *ngFor="let taskType of taskTypes" [value]="taskType">{{ taskType }}</option>
        </select>
      </label>

      <div class="actions">
        <button type="button" class="secondary-action" (click)="clear()">Clear</button>
        <button type="submit" class="primary-action">Apply Filter</button>
      </div>
    </form>
  </section>
</div>
